<script type="text/babel">
const {useState, useEffect, useRef} = React;

function useL() { return TR[LANG] || TR.ar; }

const GOAL_IDS   = ['retirement','house','education','car','emergency','wealth'];
const GOAL_ICONS = ['🏖️','🏠','🎓','🚗','🛡️','💎'];
const RISK_SCORES = [0,25,65,100];

function fmt(n){ if(!n||isNaN(n))return'0'; return Math.abs(n).toLocaleString('en',{maximumFractionDigits:0}); }
function fv(m,y,r=0.08){ const n=y*12,rt=r/12; return rt===0?m*n:m*((Math.pow(1+rt,n)-1)/rt); }

function calcMetrics(data){
  const {income,assets,liabilities,expenses,risk} = data;
  const p = v => parseFloat(v)||0;
  const ti = p(income.salary)+p(income.freelance)+p(income.rental)+p(income.other);
  const ta = p(assets.cash)+p(assets.bank)+p(assets.gold)+p(assets.realestate)+p(assets.vehicles)+p(assets.stocks)+p(assets.crypto)+p(assets.other);
  const liq = p(assets.cash)+p(assets.bank);
  const tl = p(liabilities.personal)+p(liabilities.credit)+p(liabilities.car)+p(liabilities.mortgage)+p(liabilities.family)+p(liabilities.other);
  const md = p(liabilities.personalPay)+p(liabilities.creditPay)+p(liabilities.carPay)+p(liabilities.mortgagePay);
  const fe = p(expenses.housing)+p(expenses.utilities)+p(expenses.insurance)+p(expenses.school)+p(expenses.internet)+p(expenses.transport);
  const ve = p(expenses.food)+p(expenses.entertainment)+p(expenses.shopping)+p(expenses.restaurants)+p(expenses.travel)+p(expenses.misc);
  const te = fe+ve+md;
  const cf = ti-te;
  const sav = Math.max(0,cf);
  const sr = ti>0?(sav/ti)*100:0;
  const dr = ti>0?(md/ti)*100:0;
  const em = te>0?liq/te:0;
  const nw = ta-tl;
  let rs=0;
  if(risk){ Object.values(risk).forEach(v=>{ rs+=RISK_SCORES[v]||0; }); rs=Object.keys(risk).length>0?rs/Object.keys(risk).length:0; }
  let rd=0;
  if(dr<=20)rd+=25; else if(dr<=35)rd+=18; else if(dr<=50)rd+=10; else if(dr<=70)rd+=4;
  if(cf>ti*.3)rd+=20; else if(cf>ti*.15)rd+=14; else if(cf>0)rd+=7;
  if(em>=6)rd+=25; else if(em>=3)rd+=18; else if(em>=1)rd+=8;
  if(sr>=20)rd+=20; else if(sr>=10)rd+=13; else if(sr>0)rd+=6;
  if(ti>0)rd+=10;
  const hs = Math.round((rd*.4)+(Math.max(0,Math.min(100,(cf/(ti||1))*200))*.2)+(Math.min(100,em*12)*.25)+(Math.min(100,100-dr)*.15));
  let rp='محافظ'; if(LANG==='en'){ rp='Conservative'; if(rs>=80)rp='Aggressive'; else if(rs>=65)rp='Growth'; else if(rs>=50)rp='Balanced'; else if(rs>=35)rp='Moderate'; } else { if(rs>=80)rp='عدواني'; else if(rs>=65)rp='نمو'; else if(rs>=50)rp='متوازن'; else if(rs>=35)rp='معتدل'; }
  let alloc=null;
  if(rd>=60){
    if(rs<35)alloc={eq:20,fi:70,cs:10,lbl:TR[LANG].riskNames[0]};
    else if(rs<50)alloc={eq:35,fi:50,cs:15,lbl:TR[LANG].riskNames[1]};
    else if(rs<65)alloc={eq:50,fi:35,cs:15,lbl:TR[LANG].riskNames[2]};
    else if(rs<80)alloc={eq:65,fi:25,cs:10,lbl:TR[LANG].riskNames[3]};
    else alloc={eq:80,fi:10,cs:10,lbl:TR[LANG].riskNames[4]};
  }
  return {ti,ta,liq,tl,md,fe,ve,te,cf,sav,sr,dr,em,nw,rd,hs,rs,rp,alloc};
}

// ── UI COMPONENTS ─────────────────────────────────────────────────────────────
function Ring({score,size=120,label,color='#C9A84C'}){
  const r=(size-16)/2,c=2*Math.PI*r,d=(score/100)*c;
  return(
    <div style={{textAlign:'center',display:'inline-block'}}>
      <svg width={size} height={size} style={{transform:'rotate(-90deg)'}}>
        <circle cx={size/2} cy={size/2} r={r} fill='none' stroke='#1a2a1a' strokeWidth={8}/>
        <circle cx={size/2} cy={size/2} r={r} fill='none' stroke={color} strokeWidth={8} strokeDasharray={`${d} ${c}`} strokeLinecap='round' style={{transition:'stroke-dasharray 1.2s ease'}}/>
      </svg>
      <div style={{marginTop:-(size/2+10),position:'relative',top:size/2-18}}>
        <div style={{fontSize:size>100?26:18,fontWeight:900,color}}>{score}</div>
        {label&&<div style={{fontSize:10,color:'#8aad8a',marginTop:2}}>{label}</div>}
      </div>
    </div>
  );
}

function Inp({label,value,onChange,pfx='BD',type='number',hint}){
  return(
    <div style={{marginBottom:14}}>
      <label style={{display:'block',fontSize:12,color:'#8aad8a',marginBottom:5,fontWeight:600}}>{label}</label>
      <div style={{position:'relative'}}>
        <input type={type} value={value} onChange={e=>onChange(e.target.value)}
          style={{width:'100%',background:'#0f1f0f',border:'1px solid #2a4a2a',borderRadius:8,padding:'10px 12px',paddingRight:pfx?50:12,color:'#e8f0e8',fontSize:14,outline:'none',boxSizing:'border-box',direction:'ltr',textAlign:'right'}}
          onFocus={e=>e.target.style.borderColor='#C9A84C'} onBlur={e=>e.target.style.borderColor='#2a4a2a'}/>
        {pfx&&<span style={{position:'absolute',left:10,top:'50%',transform:'translateY(-50%)',color:'#C9A84C',fontSize:11,fontWeight:700}}>{pfx}</span>}
      </div>
      {hint&&<div style={{fontSize:10,color:'#4a6a4a',marginTop:3}}>{hint}</div>}
    </div>
  );
}

function Sel({label,value,onChange,opts}){
  return(
    <div style={{marginBottom:14}}>
      <label style={{display:'block',fontSize:12,color:'#8aad8a',marginBottom:5,fontWeight:600}}>{label}</label>
      <select value={value} onChange={e=>onChange(e.target.value)}
        style={{width:'100%',background:'#0f1f0f',border:'1px solid #2a4a2a',borderRadius:8,padding:'10px 12px',color:'#e8f0e8',fontSize:14,outline:'none',boxSizing:'border-box'}}>
        {opts.map(o=><option key={o} value={o}>{o}</option>)}
      </select>
    </div>
  );
}

function Bar({label,pct,color='#C9A84C'}){
  return(
    <div style={{marginBottom:10}}>
      <div style={{display:'flex',justifyContent:'space-between',marginBottom:4}}>
        <span style={{fontSize:12,color:'#8aad8a'}}>{label}</span>
        <span style={{fontSize:12,color,fontWeight:700}}>{Math.round(pct)}%</span>
      </div>
      <div style={{background:'#1a2a1a',borderRadius:4,height:7,overflow:'hidden'}}>
        <div style={{width:`${Math.min(100,Math.max(0,pct))}%`,background:color,height:'100%',borderRadius:4,transition:'width 1s ease'}}/>
      </div>
    </div>
  );
}

function Card({label,value,sub,color='#C9A84C',icon}){
  return(
    <div style={{background:'linear-gradient(135deg,#0f1f0f,#162616)',border:`1px solid ${color}33`,borderRadius:12,padding:'16px 14px'}}>
      <div style={{fontSize:18,marginBottom:4}}>{icon}</div>
      <div style={{fontSize:20,fontWeight:900,color}}>{value}</div>
      <div style={{fontSize:11,color:'#8aad8a',marginTop:2}}>{label}</div>

function AIDoc({metrics}){
  const [adv,setAdv]=useState(null);
  const [load,setLoad]=useState(false);
  const [asked,setAsked]=useState(false);
  const L=useL();
  const m=metrics;
  const ask=async()=>{
    setLoad(true);setAsked(true);
    try{
      const res=await fetch('https://cash-clinic-ai.bahrain-first.workers.dev',{
        method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({
          model:'claude-haiku-4-5-20251001',max_tokens:1000,
          system:L.aiSystem,
          messages:[{role:'user',content:`Financial data:
- Monthly Income: BD ${fmt(m.ti)}
- Cash Flow: BD ${fmt(m.cf)} (${m.cf>=0?'positive':'negative'})
- Debt Ratio: ${Math.round(m.dr)}%
- Emergency Months: ${m.em.toFixed(1)}
- Savings Rate: ${Math.round(m.sr)}%
- Investment Readiness: ${Math.round(m.rd)}/100
- Health Score: ${m.hs}/100
- Net Worth: BD ${fmt(m.nw)}
- Risk Profile: ${m.rp}`}]
        })
      });
      const d=await res.json();
      if(d.content&&d.content[0]&&d.content[0].text){
        setAdv(d.content[0].text);
      } else if(d.error){
        setAdv('⚠️ '+(d.error.message||d.error));
      } else {
        setAdv('⚠️ '+JSON.stringify(d).slice(0,200));
      }
    }catch(e){setAdv('⚠️ '+e.message);}
    setLoad(false);
  };
  return(
    <div style={{background:'linear-gradient(135deg,#0a1a0a,#142014)',border:'1px solid #C9A84C44',borderRadius:16,padding:20,marginTop:20}}>
      <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:16}}>
        <div style={{fontSize:32}}>🩺</div>
        <div>
          <div style={{fontSize:16,fontWeight:900,color:'#C9A84C'}}>{L.aiTitle}</div>
          <div style={{fontSize:11,color:'#6a8a6a'}}>{L.aiSub}</div>
        </div>
      </div>
      {!asked?(
        <button onClick={ask} style={{background:'linear-gradient(135deg,#C9A84C,#a8892e)',border:'none',borderRadius:10,padding:'13px 0',color:'#0a0f0a',fontWeight:900,fontSize:14,cursor:'pointer',width:'100%'}}>
          {L.aiBtn}
        </button>
      ):load?(
        <div style={{textAlign:'center',padding:24}}>
          <div style={{fontSize:28,animation:'spin 1s linear infinite',display:'inline-block'}}>⚕️</div>
          <div style={{color:'#8aad8a',marginTop:10,fontSize:13}}>{L.aiLoading}</div>
        </div>
      ):(
        <div>
          <div style={{background:'#0d1a0d',borderRadius:10,padding:16,color:'#c8e0c8',fontSize:13,lineHeight:2.1,whiteSpace:'pre-wrap'}}>{adv}</div>
          <button onClick={()=>{setAdv(null);setAsked(false);}} style={{background:'transparent',border:'1px solid #2a4a2a',borderRadius:8,padding:'8px 0',color:'#6a8a6a',fontSize:12,cursor:'pointer',width:'100%',marginTop:10}}>
            {L.aiRetry}
          </button>
        </div>
      )}
    </div>
  );
}

      </div>
    </div>
  );

              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
                <Inp label={L.balL} value={liabilities[bal]} onChange={v=>setLiabilities({...liabilities,[bal]:v})}/>
                <Inp label={L.payL} value={liabilities[pay]} onChange={v=>setLiabilities({...liabilities,[pay]:v})}/>
              </div>
            </div>
          ))}
          <Inp label={L.famDebtL} value={liabilities.family} onChange={v=>setLiabilities({...liabilities,family:v})}/>
          <Inp label={L.otherDebtL} value={liabilities.other} onChange={v=>setLiabilities({...liabilities,other:v})}/>
        </div>
      );
      case 5: return(
        <div>
          <SecHdr icon='💳' title={L.expTitle} sub={L.expSub}/>
          <div style={{color:'#C9A84C',fontSize:11,marginBottom:10,fontWeight:700}}>{L.fixedHdr}</div>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'0 12px'}}>
            {['housing','utilities','insurance','school','internet','transport'].map((k,i)=>(
              <Inp key={k} label={L.fixedItems[i]} value={expenses[k]} onChange={v=>setExpenses({...expenses,[k]:v})}/>
            ))}
          </div>
          <div style={{color:'#C9A84C',fontSize:11,marginBottom:10,fontWeight:700}}>{L.varHdr}</div>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'0 12px'}}>
            {['food','entertainment','shopping','restaurants','travel','misc'].map((k,i)=>(
              <Inp key={k} label={L.varItems[i]} value={expenses[k]} onChange={v=>setExpenses({...expenses,[k]:v})}/>
            ))}
          </div>
        </div>
      );
      case 6: return(
        <div>
          <SecHdr icon='📊' title={L.riskTitle} sub={L.riskSub}/>
          {L.riskQs.map((q,qi)=>(
            <div key={qi} style={{marginBottom:16,background:'#0f1f0f',border:'1px solid #2a4a2a',borderRadius:12,padding:14}}>
              <div style={{color:'#c8e0c8',fontSize:13,marginBottom:10,fontWeight:700}}>{qi+1}. {q.q}</div>
              <div style={{display:'flex',flexDirection:'column',gap:6}}>
                {q.opts.map((opt,oi)=>(
                  <button key={oi} onClick={()=>setRisk({...risk,[qi]:oi})}
                    style={{background:risk[qi]===oi?'#C9A84C22':'#0a150a',border:`1px solid ${risk[qi]===oi?'#C9A84C':'#2a3a2a'}`,borderRadius:8,padding:'9px 12px',color:risk[qi]===oi?'#C9A84C':'#8aad8a',fontSize:12,cursor:'pointer',textAlign:'right',fontWeight:risk[qi]===oi?700:400,transition:'all .2s'}}>
                    {opt}
                  </button>
                ))}
              </div>
            </div>
          ))}
          {Object.keys(risk).length===5&&(
            <div style={{background:'#0f2a0f',border:'1px solid #C9A84C44',borderRadius:10,padding:14,textAlign:'center'}}>
              <div style={{color:'#8aad8a',fontSize:11}}>{L.riskProfileL}</div>
              <div style={{color:'#C9A84C',fontSize:20,fontWeight:900}}>{metrics.rp}</div>
            </div>
          )}
        </div>
      );
      case 7: return(
        <div>
          <SecHdr icon='🎯' title={L.goalsTitle} sub={L.goalsSub}/>
          <div style={{background:'#0f1f0f',border:'1px solid #2a4a2a',borderRadius:12,padding:16,marginBottom:18}}>
            <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:6,marginBottom:12}}>
              {GOAL_TYPES_NOW.map(g=>(
                <button key={g.id} onClick={()=>setGoalForm({...goalForm,type:g.id})}
                  style={{background:goalForm.type===g.id?'#C9A84C22':'#0a150a',border:`1px solid ${goalForm.type===g.id?'#C9A84C':'#2a3a2a'}`,borderRadius:8,padding:'8px 4px',cursor:'pointer',color:goalForm.type===g.id?'#C9A84C':'#8aad8a',fontSize:11,fontWeight:goalForm.type===g.id?700:400,transition:'all .2s'}}>
                  <div style={{fontSize:18}}>{g.icon}</div>
                  <div>{g.label}</div>
                </button>
              ))}
            </div>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
              <Inp label={L.targetL} value={goalForm.target} onChange={v=>setGoalForm({...goalForm,target:v})}/>
              <Inp label={L.yearsL} value={goalForm.years} onChange={v=>setGoalForm({...goalForm,years:v})} pfx={L.yearsPfx}/>
            </div>
            <button onClick={addGoal} style={{background:'linear-gradient(135deg,#C9A84C,#a8892e)',border:'none',borderRadius:8,padding:'11px 0',color:'#0a0f0a',fontWeight:900,fontSize:13,cursor:'pointer',width:'100%'}}>
              {L.addGoalBtn}
            </button>
          </div>
          {goals.map(g=>{
            const gt=GOAL_TYPES_NOW.find(x=>x.id===g.type);
            return(
              <div key={g.id} style={{background:'#0a150a',border:'1px solid #2a4a2a',borderRadius:10,padding:14,marginBottom:10,display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                <div>
                  <div style={{color:'#c8e0c8',fontWeight:700,fontSize:13}}>{gt?.icon} {gt?.label}</div>
                  <div style={{color:'#6a8a6a',fontSize:11,marginTop:2}}>{L.goalTypes&&`${L.steps[7]}: ${g.years}`}</div>
                </div>
                <div style={{textAlign:'left'}}>
                  <div style={{color:'#C9A84C',fontWeight:900}}>BD {fmt(g.target)}</div>
                  <div style={{color:'#8aad8a',fontSize:11}}>BD {fmt(g.monthly)}/{lang==='ar'?'شهر':'mo'}</div>
                </div>
              </div>
            );
          })}
          {goals.length===0&&<div style={{color:'#4a6a4a',textAlign:'center',fontSize:12,padding:20}}>{L.noGoals}</div>}
        </div>
      );
      case 8: return <DiagPage metrics={metrics} goals={goals} projYears={projYears} setProjYears={setProjYears}/>;
      default: return null;
    }
  };

  return(
    <div style={{fontFamily:"'Noto Sans Arabic','Segoe UI',sans-serif",background:'#070e07',minHeight:'100vh',color:'#e8f0e8',direction:isRTL?'rtl':'ltr'}}>
      {/* Lang button */}
      <button className='lang-btn' style={{[isRTL?'left':'right']:'16px'}}
        onClick={()=>{
          const nl=lang==='ar'?'en':'ar';
          LANG=nl; window._LANG=nl;
          document.documentElement.dir=nl==='ar'?'rtl':'ltr';
          document.documentElement.lang=nl;
          setLang(nl);
          setPersonal(p=>({...p,marital:TR[nl].maritalOpts[0],employment:TR[nl].empOpts[0]}));
        }}>
        {L.langBtn}
      </button>
      {/* Header */}
      <div style={{background:'linear-gradient(180deg,#0a1a0a,#070e07)',borderBottom:'1px solid #C9A84C22',padding:'12px 16px',display:'flex',alignItems:'center',justifyContent:'space-between',position:'sticky',top:0,zIndex:50}}>
        <div style={{display:'flex',alignItems:'center',gap:8}}>
          <span style={{fontSize:22}}>🏥</span>
          <div>
            <div style={{fontSize:14,fontWeight:900,color:'#C9A84C'}}>Cash Clinic Pro</div>
            <div style={{fontSize:9,color:'#4a6a4a'}}>{L.tagline}</div>
          </div>
        </div>
        {step>0&&step<8&&(
          <div style={{display:'flex',alignItems:'center',gap:6}}>
            <div style={{fontSize:10,color:'#6a8a6a'}}>{step}/7</div>
            <div style={{width:50,height:4,background:'#1a2a1a',borderRadius:4,overflow:'hidden'}}>
              <div style={{width:`${(step/7)*100}%`,height:'100%',background:'#C9A84C',transition:'width .4s ease'}}/>
            </div>
          </div>
        )}
      </div>
      {/* Step tabs */}
      {step>0&&step<8&&(
        <div style={{padding:'8px 14px 0',overflowX:'auto',display:'flex',gap:5,WebkitOverflowScrolling:'touch'}}>
          {L.steps.slice(1,8).map((s,i)=>(
            <button key={i} onClick={()=>setStep(i+1)}
              style={{fontSize:10,padding:'4px 9px',borderRadius:20,cursor:'pointer',whiteSpace:'nowrap',background:step===i+1?'#C9A84C22':'#0f1f0f',border:`1px solid ${step===i+1?'#C9A84C':'#1a2a1a'}`,color:step===i+1?'#C9A84C':step>i+1?'#6aaa6a':'#4a6a4a',fontWeight:step===i+1?700:400}}>
              {step>i+1?'✓ ':''}{s}
            </button>
          ))}
        </div>
      )}
      {/* Content */}
      <div style={{maxWidth:520,margin:'0 auto',padding:'18px 14px 110px'}}>
        <div className='fade' key={`${step}-${lang}`}>{renderStep()}</div>
      </div>
      {/* Nav */}
      {step<8&&(
        <div style={{position:'fixed',bottom:0,left:0,right:0,background:'linear-gradient(180deg,transparent,#070e07 30%)',padding:'16px 14px 28px',display:'flex',gap:10,maxWidth:520,margin:'0 auto'}}>
          {step>0&&(
            <button onClick={goPrev} style={{flex:1,background:'transparent',border:'1px solid #2a4a2a',borderRadius:12,padding:'13px 0',color:'#8aad8a',fontSize:13,cursor:'pointer'}}>
              {L.backBtn}
            </button>
          )}
          <button onClick={goNext} style={{flex:2,background:'linear-gradient(135deg,#C9A84C,#a8892e)',border:'none',borderRadius:12,padding:'13px 0',color:'#0a0f0a',fontWeight:900,fontSize:13,cursor:'pointer'}}>
            {step===7?L.diagBtn:step===0?L.startBtn:L.nextBtn}
          </button>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
