<script type="text/babel">
const {useState,useEffect,useRef}=React;

const STEPS=[
  {id:"welcome"},{id:"personal"},{id:"income"},{id:"assets"},
  {id:"liabilities"},{id:"expenses"},{id:"risk"},{id:"goals"},{id:"diagnosis"}
];
function getStepLabel(i){ return (window.T?.[window._lang||'ar']?.steps||window.T?.ar?.steps)?.[i]||''; }

const RISK_Q_AR=[
  {id:"exp",q:"ما مدى خبرتك في الاستثمار؟",opts:["لا خبرة","مبتدئ","متوسط","خبير"],scores:[0,25,65,100]},
  {id:"loss",q:"إذا انخفضت محفظتك 20%، ماذا ستفعل؟",opts:["أبيع كل شيء","أبيع جزءاً","أنتظر","أشتري أكثر"],scores:[0,25,65,100]},
  {id:"horizon",q:"ما أفق استثمارك الزمني؟",opts:["أقل من سنة","1-3 سنوات","3-7 سنوات","أكثر من 7 سنوات"],scores:[0,25,65,100]},
  {id:"stability",q:"مدى استقرار دخلك الشهري؟",opts:["غير مستقر","متذبذب نسبياً","مستقر","مستقر جداً"],scores:[0,25,65,100]},
  {id:"goal",q:"هدفك الأساسي من الاستثمار؟",opts:["حماية رأس المال","دخل ثابت","نمو متوازن","نمو مرتفع"],scores:[0,25,65,100]},
];
const RISK_Q_EN=[
  {id:"exp",q:"How experienced are you with investing?",opts:["No experience","Beginner","Intermediate","Expert"],scores:[0,25,65,100]},
  {id:"loss",q:"If your portfolio drops 20%, what do you do?",opts:["Sell everything","Sell some","Wait","Buy more"],scores:[0,25,65,100]},
  {id:"horizon",q:"What is your investment time horizon?",opts:["Less than 1 year","1-3 years","3-7 years","More than 7 years"],scores:[0,25,65,100]},
  {id:"stability",q:"How stable is your monthly income?",opts:["Unstable","Somewhat stable","Stable","Very stable"],scores:[0,25,65,100]},
  {id:"goal",q:"What is your primary investment goal?",opts:["Capital protection","Fixed income","Balanced growth","High growth"],scores:[0,25,65,100]},
];
function getRiskQ(){ return window._lang==='en'?RISK_Q_EN:RISK_Q_AR; }
const RISK_Q = RISK_Q_AR;

const GOAL_IDS=["retirement","house","education","car","emergency","wealth"];
const GOAL_ICONS=["🏖️","🏠","🎓","🚗","🛡️","💎"];
function getGoalTypes(){
  const labels=window.T?.[window._lang||'ar']?.goalTypes||window.T?.ar?.goalTypes||[];
  return GOAL_IDS.map((id,i)=>({id,label:labels[i]||id,icon:GOAL_ICONS[i]}));
}
const GOAL_TYPES=getGoalTypes();

function fmt(n){if(!n||isNaN(n))return"0";return Math.abs(n).toLocaleString("ar-BH",{maximumFractionDigits:0});}
function fv(m,y,r=0.08){const n=y*12,rt=r/12;return rt===0?m*n:m*((Math.pow(1+rt,n)-1)/rt);}

function calcMetrics(data){
  const{income,assets,liabilities,expenses,risk}=data;
  const p=(v)=>parseFloat(v)||0;
  const totalIncome=p(income.salary)+p(income.freelance)+p(income.rental)+p(income.other);
  const totalAssets=p(assets.cash)+p(assets.bank)+p(assets.gold)+p(assets.realestate)+p(assets.vehicles)+p(assets.stocks)+p(assets.crypto)+p(assets.other);
  const liquidAssets=p(assets.cash)+p(assets.bank);
  const totalLiabilities=p(liabilities.personal)+p(liabilities.credit)+p(liabilities.car)+p(liabilities.mortgage)+p(liabilities.family)+p(liabilities.other);
  const monthlyDebt=p(liabilities.personalPay)+p(liabilities.creditPay)+p(liabilities.carPay)+p(liabilities.mortgagePay);
  const fixedExp=p(expenses.housing)+p(expenses.utilities)+p(expenses.insurance)+p(expenses.school)+p(expenses.internet)+p(expenses.transport);
  const varExp=p(expenses.food)+p(expenses.entertainment)+p(expenses.shopping)+p(expenses.restaurants)+p(expenses.travel)+p(expenses.misc);
  const totalExpenses=fixedExp+varExp+monthlyDebt;
  const cashFlow=totalIncome-totalExpenses;
  const savings=Math.max(0,cashFlow);
  const savingsRate=totalIncome>0?(savings/totalIncome)*100:0;
  const debtRatio=totalIncome>0?(monthlyDebt/totalIncome)*100:0;
  const emergencyMonths=totalExpenses>0?liquidAssets/totalExpenses:0;
  const netWorth=totalAssets-totalLiabilities;
  let riskScore=0;
  if(risk){RISK_Q.forEach(q=>{const a=risk[q.id];if(a!==undefined)riskScore+=q.scores[a];});riskScore=RISK_Q.length>0?riskScore/RISK_Q.length:0;}
  let readiness=0;
  if(debtRatio<=20)readiness+=25;else if(debtRatio<=35)readiness+=18;else if(debtRatio<=50)readiness+=10;else if(debtRatio<=70)readiness+=4;
  if(cashFlow>totalIncome*.3)readiness+=20;else if(cashFlow>totalIncome*.15)readiness+=14;else if(cashFlow>0)readiness+=7;
  if(emergencyMonths>=6)readiness+=25;else if(emergencyMonths>=3)readiness+=18;else if(emergencyMonths>=1)readiness+=8;
  if(savingsRate>=20)readiness+=20;else if(savingsRate>=10)readiness+=13;else if(savingsRate>0)readiness+=6;
  if(totalIncome>0)readiness+=10;
  const healthScore=Math.round((readiness*.4)+(Math.max(0,Math.min(100,(cashFlow/(totalIncome||1))*200))*.2)+(Math.min(100,emergencyMonths*12)*.25)+(Math.min(100,100-debtRatio)*.15));
  let riskProfile="محافظ";
  if(riskScore>=80)riskProfile="عدواني";else if(riskScore>=65)riskProfile="نمو";else if(riskScore>=50)riskProfile="متوازن";else if(riskScore>=35)riskProfile="معتدل";
  let allocation=null;
  if(readiness>=60){
    if(riskScore<35)allocation={equity:20,fixed:70,cash:10,label:"محافظ"};
    else if(riskScore<50)allocation={equity:35,fixed:50,cash:15,label:"معتدل"};
    else if(riskScore<65)allocation={equity:50,fixed:35,cash:15,label:"متوازن"};
    else if(riskScore<80)allocation={equity:65,fixed:25,cash:10,label:"نمو"};
    else allocation={equity:80,fixed:10,cash:10,label:"عدواني"};
  }
  return{totalIncome,totalAssets,liquidAssets,totalLiabilities,monthlyDebt,fixedExp,varExp,totalExpenses,cashFlow,savings,savingsRate,debtRatio,emergencyMonths,netWorth,readiness,healthScore,riskScore,riskProfile,allocation};
}

function ScoreRing({score,size=120,label,color="#C9A84C"}){
  const r=(size-16)/2,circ=2*Math.PI*r,dash=(score/100)*circ;
  return(
    <div style={{textAlign:"center",display:"inline-block"}}>
      <svg width={size} height={size} style={{transform:"rotate(-90deg)"}}>
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="#1a2a1a" strokeWidth={8}/>
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color} strokeWidth={8} strokeDasharray={`${dash} ${circ}`} strokeLinecap="round" style={{transition:"stroke-dasharray 1.2s ease"}}/>
      </svg>
      <div style={{marginTop:-(size/2+10),position:"relative",top:size/2-18}}>
        <div style={{fontSize:size>100?26:18,fontWeight:900,color}}>{score}</div>
        <div style={{fontSize:10,color:"#8aad8a",marginTop:2}}>{label}</div>
      </div>
    </div>
  );
}

function Input({label,value,onChange,prefix="BD",type="number",hint}){
  return(
    <div style={{marginBottom:14}}>
      <label style={{display:"block",fontSize:12,color:"#8aad8a",marginBottom:5,fontWeight:600}}>{label}</label>
      <div style={{position:"relative"}}>

- الدخل الشهري: BD ${fmt(m.totalIncome)}

    if(!goalForm.target)return;
    const monthly=parseFloat(goalForm.target)/(parseFloat(goalForm.years)*12);
    setGoals(g=>[...g,{...goalForm,monthly:Math.round(monthly),id:Date.now()}]);
    setGoalForm({type:"retirement",target:"",years:"10"});
  };

  const totalInc=metrics.totalIncome;

  const renderStep=()=>{
    switch(step){
      case 0:return(
        <div style={{textAlign:"center",padding:"30px 10px"}}>
          <div style={{fontSize:64,marginBottom:16}}>🏥</div>
          <div style={{fontSize:28,fontWeight:900,color:"#C9A84C",marginBottom:6}}>Cash Clinic Pro</div>
          <div style={{fontSize:13,color:"#8aad8a",marginBottom:6}}>{L.tagline}</div>
          <div style={{background:"#0f1f0f",border:"1px solid #C9A84C33",borderRadius:16,padding:20,marginBottom:24,textAlign:"right"}}>
            <div style={{color:"#C9A84C",fontSize:14,fontWeight:800,marginBottom:14}}>{L.philosophy}</div>
            {[L.phil1,L.phil2,L.phil3,L.phil4].map((t,i)=>(
              <div key={i} style={{display:"flex",gap:8,alignItems:"flex-start",marginBottom:10}}>
                <span style={{color:"#C9A84C",fontWeight:900,minWidth:18,fontSize:13}}>{i+1}.</span>
                <span style={{color:"#c8e0c8",fontSize:12,lineHeight:1.6}}>{t}</span>
              </div>
            ))}
          </div>
          <div style={{background:"#0a150a",border:"1px solid #1a2a1a",borderRadius:10,padding:10,marginBottom:20,fontSize:11,color:"#4a6a4a"}}>
            {L.privacy}
          </div>
        </div>
      );
      case 1:return(
        <div>
          <SectionHeader icon="👤" title={L.personalTitle} sub={L.personalSub}/>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"0 12px"}}>
            <Input label="الاسم" value={personal.name} onChange={v=>setPersonal({...personal,name:v})} prefix="" type="text"/>
            <Input label="العمر" value={personal.age} onChange={v=>setPersonal({...personal,age:v})} prefix="سنة"/>
            <Sel label="الحالة الاجتماعية" value={personal.marital} onChange={v=>setPersonal({...personal,marital:v})} options={["أعزب","متزوج","مطلق","أرمل"].map(x=>({v:x,l:x}))}/>
            <Input label="المعالون" value={personal.dependents} onChange={v=>setPersonal({...personal,dependents:v})} prefix="فرد"/>
          </div>
          <Sel label="حالة التوظيف" value={personal.employment} onChange={v=>setPersonal({...personal,employment:v})} options={["موظف حكومي","موظف قطاع خاص","عسكري","أعمال حرة","صاحب عمل","متقاعد"].map(x=>({v:x,l:x}))}/>
        </div>
      );
      case 2:return(
        <div>
          <SectionHeader icon="💰" title={L.incomeTitle} sub={L.incomeSub}/>
          <Input label={L.salaryLabel} value={income.salary} onChange={v=>setIncome({...income,salary:v})} hint={L.salaryHint}/>
          <Input label={L.freelanceLabel} value={income.freelance} onChange={v=>setIncome({...income,freelance:v})}/>
          <Input label={L.rentalLabel} value={income.rental} onChange={v=>setIncome({...income,rental:v})}/>
          <Input label={L.otherIncomeLabel} value={income.other} onChange={v=>setIncome({...income,other:v})}/>
          {totalInc>0&&<div style={{background:"#0f2a0f",border:"1px solid #C9A84C44",borderRadius:10,padding:14,marginTop:4}}>
            <div style={{color:"#8aad8a",fontSize:11}}>{L.totalIncomeLabel}</div>
            <div style={{color:"#C9A84C",fontSize:22,fontWeight:900}}>BD {fmt(totalInc)}</div>
          </div>}
        </div>
      );
      case 3:return(
        <div>
          <SectionHeader icon="🏦" title={L.assetsTitle} sub={L.assetsSub}/>
          {[["cash",0],["bank",1],["gold",2],["realestate",3],["vehicles",4],["stocks",5],["crypto",6],["other",7]].map(([k,li])=>{const l=L.assetLabels?.[li]||k; return(
            <Input key={k} label={l} value={assets[k]} onChange={v=>setAssets({...assets,[k]:v})}/>
          );})}
          {metrics.totalAssets>0&&<div style={{background:"#0f2a0f",border:"1px solid #4CAF5044",borderRadius:10,padding:14}}>
            <div style={{color:"#8aad8a",fontSize:11}}>{L.totalAssetsLabel}</div>
            <div style={{color:"#4CAF50",fontSize:22,fontWeight:900}}>BD {fmt(metrics.totalAssets)}</div>
          </div>}
        </div>
      );
      case 4:return(
        <div>
          <SectionHeader icon="⚖️" title={L.liabTitle} sub={L.liabSub}/>
          {[["personal","personalPay","قرض شخصي"],["credit","creditPay","بطاقات ائتمانية"],["car","carPay","قرض سيارة"],["mortgage","mortgagePay","رهن عقاري"]].map(([bal,pay,label])=>(
            <div key={bal} style={{background:"#100f0f",border:"1px solid #2a1a1a",borderRadius:10,padding:14,marginBottom:12}}>
              <div style={{color:"#c0a070",fontSize:12,fontWeight:700,marginBottom:10}}>{label}</div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
                <Input label="الرصيد المتبقي" value={liabilities[bal]} onChange={v=>setLiabilities({...liabilities,[bal]:v})}/>
                <Input label="القسط الشهري" value={liabilities[pay]} onChange={v=>setLiabilities({...liabilities,[pay]:v})}/>
              </div>
            </div>
          ))}
          <Input label="ديون عائلية" value={liabilities.family} onChange={v=>setLiabilities({...liabilities,family:v})}/>
          <Input label="ديون أخرى" value={liabilities.other} onChange={v=>setLiabilities({...liabilities,other:v})}/>
        </div>
      );
      case 5:return(
        <div>
          <SectionHeader icon="💳" title={L.expTitle} sub={L.expSub}/>
          <div style={{color:"#C9A84C",fontSize:11,marginBottom:10,fontWeight:700}}>{L.fixedLabel}</div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"0 12px"}}>
            {[["housing","السكن"],["utilities","الكهرباء والماء"],["insurance","التأمين"],["school","المدرسة"],["internet","الإنترنت"],["transport","المواصلات"]].map(([k,l])=>(
              <Input key={k} label={l} value={expenses[k]} onChange={v=>setExpenses({...expenses,[k]:v})}/>
            ))}
          </div>
          <div style={{color:"#C9A84C",fontSize:11,marginBottom:10,fontWeight:700}}>{L.varLabel}</div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"0 12px"}}>
            {[["food","الطعام"],["entertainment","الترفيه"],["shopping","التسوق"],["restaurants","المطاعم"],["travel","السفر"],["misc","متنوعات"]].map(([k,l])=>(
              <Input key={k} label={l} value={expenses[k]} onChange={v=>setExpenses({...expenses,[k]:v})}/>
            ))}
          </div>
        </div>
      );
      case 6:return(
        <div>
          <SectionHeader icon="📊" title={L.riskTitle} sub={L.riskSub}/>
          {RISK_Q.map((q,qi)=>(
            <div key={q.id} style={{marginBottom:16,background:"#0f1f0f",border:"1px solid #2a4a2a",borderRadius:12,padding:14}}>
              <div style={{color:"#c8e0c8",fontSize:13,marginBottom:10,fontWeight:700}}>{qi+1}. {q.q}</div>
              <div style={{display:"flex",flexDirection:"column",gap:6}}>
                {q.opts.map((opt,oi)=>(
                  <button key={oi} onClick={()=>setRisk({...risk,[q.id]:oi})}
                    style={{background:risk[q.id]===oi?"#C9A84C22":"#0a150a",border:`1px solid ${risk[q.id]===oi?"#C9A84C":"#2a3a2a"}`,borderRadius:8,padding:"9px 12px",color:risk[q.id]===oi?"#C9A84C":"#8aad8a",fontSize:12,cursor:"pointer",textAlign:"right",fontWeight:risk[q.id]===oi?700:400,transition:"all .2s"}}>
                    {opt}
                  </button>
                ))}
              </div>
            </div>
          ))}
          {Object.keys(risk).length===RISK_Q.length&&(
            <div style={{background:"#0f2a0f",border:"1px solid #C9A84C44",borderRadius:10,padding:14,textAlign:"center"}}>
              <div style={{color:"#8aad8a",fontSize:11}}>ملف مخاطرك</div>
              <div style={{color:"#C9A84C",fontSize:20,fontWeight:900}}>{metrics.riskProfile}</div>
            </div>
          )}
        </div>
      );
      case 7:return(
        <div>
          <SectionHeader icon="🎯" title={L.goalsTitle} sub={L.goalsSub}/>
          <div style={{background:"#0f1f0f",border:"1px solid #2a4a2a",borderRadius:12,padding:16,marginBottom:18}}>
            <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:6,marginBottom:12}}>
              {GOAL_TYPES.map(g=>(
                <button key={g.id} onClick={()=>setGoalForm({...goalForm,type:g.id})}
                  style={{background:goalForm.type===g.id?"#C9A84C22":"#0a150a",border:`1px solid ${goalForm.type===g.id?"#C9A84C":"#2a3a2a"}`,borderRadius:8,padding:"8px 4px",cursor:"pointer",color:goalForm.type===g.id?"#C9A84C":"#8aad8a",fontSize:11,fontWeight:goalForm.type===g.id?700:400,transition:"all .2s"}}>
                  <div style={{fontSize:18}}>{g.icon}</div>
                  <div>{g.label}</div>
                </button>
              ))}
            </div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
              <Input label="المبلغ (BD)" value={goalForm.target} onChange={v=>setGoalForm({...goalForm,target:v})}/>
              <Input label="المدة (سنوات)" value={goalForm.years} onChange={v=>setGoalForm({...goalForm,years:v})} prefix="سنة"/>
            </div>
            <button onClick={addGoal} style={{background:"linear-gradient(135deg,#C9A84C,#a8892e)",border:"none",borderRadius:8,padding:"11px 0",color:"#0a0f0a",fontWeight:900,fontSize:13,cursor:"pointer",width:"100%"}}>
              + إضافة الهدف
            </button>
          </div>
          {goals.map(g=>{
            const gt=GOAL_TYPES.find(x=>x.id===g.type);
            return(
              <div key={g.id} style={{background:"#0a150a",border:"1px solid #2a4a2a",borderRadius:10,padding:14,marginBottom:10,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <div>
                  <div style={{color:"#c8e0c8",fontWeight:700,fontSize:13}}>{gt?.icon} {gt?.label}</div>
                  <div style={{color:"#6a8a6a",fontSize:11,marginTop:2}}>خلال {g.years} سنوات</div>
                </div>
                <div style={{textAlign:"left"}}>
                  <div style={{color:"#C9A84C",fontWeight:900}}>BD {fmt(g.target)}</div>
                  <div style={{color:"#8aad8a",fontSize:11}}>BD {fmt(g.monthly)}/شهر</div>
                </div>
              </div>
            );
          })}
          {goals.length===0&&<div style={{color:"#4a6a4a",textAlign:"center",fontSize:12,padding:20}}>{L.noGoals}</div>}
        </div>
      );
      case 8:return <DiagnosisPage metrics={metrics} goals={goals} projYears={projYears} setProjYears={setProjYears}/>;
      default:return null;
    }
  };

  return(
    <div style={{fontFamily:"'Noto Sans Arabic','Segoe UI',sans-serif",background:"#070e07",minHeight:"100vh",color:"#e8f0e8",direction:"rtl"}}>
      {/* Header */}
      <div style={{background:"linear-gradient(180deg,#0a1a0a,#070e07)",borderBottom:"1px solid #C9A84C22",padding:"12px 16px",display:"flex",alignItems:"center",justifyContent:"space-between",position:"sticky",top:0,zIndex:50}}>
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          <span style={{fontSize:22}}>🏥</span>
          <div>
            <div style={{fontSize:14,fontWeight:900,color:"#C9A84C"}}>Cash Clinic Pro</div>
            <div style={{fontSize:9,color:"#4a6a4a"}}>{L.tagline}</div>
          </div>
        </div>
        {step>0&&step<8&&(
          <div style={{display:"flex",alignItems:"center",gap:6}}>
            <div style={{fontSize:10,color:"#6a8a6a"}}>{step}/7</div>
            <div style={{width:50,height:4,background:"#1a2a1a",borderRadius:4,overflow:"hidden"}}>
              <div style={{width:`${(step/7)*100}%`,height:"100%",background:"#C9A84C",transition:"width .4s ease"}}/>
            </div>
          </div>
        )}
      </div>

      {/* Step tabs */}
      {step>0&&step<8&&(
        <div style={{padding:"8px 14px 0",overflowX:"auto",display:"flex",gap:5,WebkitOverflowScrolling:"touch"}}>
          {STEPS.slice(1,8).map((s,i)=>(
            <button key={s.id} onClick={()=>setStep(i+1)}
              style={{fontSize:10,padding:"4px 9px",borderRadius:20,cursor:"pointer",whiteSpace:"nowrap",background:step===i+1?"#C9A84C22":"#0f1f0f",border:`1px solid ${step===i+1?"#C9A84C":"#1a2a1a"}`,color:step===i+1?"#C9A84C":step>i+1?"#6aaa6a":"#4a6a4a",fontWeight:step===i+1?700:400,fontFamily:"'Noto Sans Arabic','Segoe UI',sans-serif"}}>
              {step>i+1?"✓ ":""}{getStepLabel(i+1)}
            </button>
          ))}
        </div>
      )}

      {/* Content */}
      <div style={{maxWidth:520,margin:"0 auto",padding:"18px 14px 110px"}}>
        <div className="fade" key={step}>{renderStep()}</div>
      </div>

      {/* Nav buttons */}
      {step<8&&(
        <div style={{position:"fixed",bottom:0,left:0,right:0,background:"linear-gradient(180deg,transparent,#070e07 30%)",padding:"16px 14px 28px",display:"flex",gap:10,maxWidth:520,margin:"0 auto"}}>
          {step>0&&(
            <button onClick={goPrev} style={{flex:1,background:"transparent",border:"1px solid #2a4a2a",borderRadius:12,padding:"13px 0",color:"#8aad8a",fontSize:13,cursor:"pointer",fontFamily:"'Noto Sans Arabic','Segoe UI',sans-serif"}}>
              → رجوع
            </button>
          )}
          <button onClick={goNext} style={{flex:2,background:"linear-gradient(135deg,#C9A84C,#a8892e)",border:"none",borderRadius:12,padding:"13px 0",color:"#0a0f0a",fontWeight:900,fontSize:13,cursor:"pointer",fontFamily:"'Noto Sans Arabic','Segoe UI',sans-serif"}}>
            {step===7?L.diagBtn:step===0?L.startBtn:L.nextBtn}
          </button>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
